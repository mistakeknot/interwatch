# Default watchables — generic paths suitable for single-module repos.
# Projects can override by creating .interwatch/watchables.yaml in the project root.
# Per CONVENTIONS.md, monorepos should use namespaced paths:
#   docs/<module>-roadmap.md, docs/<module>-vision.md, docs/prds/*.md

watchables:
  - name: roadmap
    path: docs/roadmap.md
    generator: interpath:artifact-gen
    generator_args: { type: roadmap }
    signals:
      - type: bead_closed
        weight: 2
        description: "Closed bead may affect roadmap phasing"
      - type: bead_created
        weight: 1
        description: "New bead may need roadmap placement"
      - type: version_bump
        weight: 3
        description: "Version bump likely means shipped work"
      - type: brainstorm_created
        weight: 1
        description: "New brainstorm may inform research agenda"
      - type: roadmap_bead_coverage
        weight: 3
        description: "Roadmap IDs missing beads or open beads missing from roadmap"
        checker: _watch_roadmap_bead_coverage
        threshold_field: coverage_pct
        threshold_min: 95
    staleness_days: 7

  - name: prd
    path: docs/PRD.md
    generator: interpath:artifact-gen
    generator_args: { type: prd }
    signals:
      - type: component_count_changed
        weight: 3
        description: "Skill/agent/command added or removed"
      - type: companion_extracted
        weight: 3
        description: "Companion plugin shipped"
      - type: version_bump
        weight: 2
        description: "Version bump may change product overview"
      - type: routing_override_applied
        weight: 2
        description: "Agent excluded via routing override — PRD coverage section may need update"
    staleness_days: 14

  - name: vision
    path: docs/vision.md
    generator: interpath:artifact-gen
    generator_args: { type: vision }
    signals:
      - type: companion_extracted
        weight: 2
        description: "New companion changes the constellation"
      - type: research_completed
        weight: 1
        description: "Research may inform direction"
    staleness_days: 30

  - name: agents-md
    path: AGENTS.md
    generator: interdoc:interdoc
    generator_args: {}
    signals:
      - type: file_renamed
        weight: 3
        description: "Renamed file may break documented paths"
      - type: file_deleted
        weight: 3
        description: "Deleted file referenced in docs"
      - type: file_created
        weight: 2
        description: "New file may need documentation"
      - type: commits_since_update
        weight: 1
        description: "Accumulated changes may drift docs"
        threshold: 20
      - type: routing_override_applied
        weight: 2
        description: "Agent excluded via routing override — documented capabilities may be stale"
    staleness_days: 14

  - name: distillation-candidates
    path: docs/solutions/
    generator: null
    generator_args: {}
    signals:
      - type: unsynthesized_doc_count
        weight: 2
        description: "Solution docs without synthesized_into that are >14 days old"
        checker: _watch_unsynthesized_count
        threshold: 5
      - type: skills_without_compact
        weight: 1
        description: "SKILL.md files >90 lines lacking SKILL-compact.md companion"
        checker: _watch_skills_without_compact
        threshold: 3
    staleness_days: 30

# ─── Signal templates ─────────────────────────────────────────────────
# Define what signals apply to each doc type. Used by discovery rules
# to build watchable entries for auto-discovered documents.

signal_templates:
  roadmap:
    generator: interpath:artifact-gen
    generator_args: { type: roadmap }
    staleness_days: 7
    signals:
      - { type: bead_closed, weight: 2 }
      - { type: bead_created, weight: 1 }
      - { type: version_bump, weight: 3 }
      - { type: brainstorm_created, weight: 1 }
      - { type: roadmap_bead_coverage, weight: 3, threshold_min: 95 }
  prd:
    generator: interpath:artifact-gen
    generator_args: { type: prd }
    staleness_days: 14
    signals:
      - { type: component_count_changed, weight: 3 }
      - { type: companion_extracted, weight: 3 }
      - { type: version_bump, weight: 2 }
      - { type: routing_override_applied, weight: 2 }
  vision:
    generator: interpath:artifact-gen
    generator_args: { type: vision }
    staleness_days: 30
    signals:
      - { type: companion_extracted, weight: 2 }
      - { type: research_completed, weight: 1 }
  agents-md:
    generator: interdoc:interdoc
    generator_args: {}
    staleness_days: 14
    signals:
      - { type: file_renamed, weight: 3 }
      - { type: file_deleted, weight: 3 }
      - { type: file_created, weight: 2 }
      - { type: commits_since_update, weight: 1, threshold: 20 }
      - { type: routing_override_applied, weight: 2 }
  distillation-candidates:
    generator: null
    generator_args: {}
    staleness_days: 30
    signals:
      - { type: unsynthesized_doc_count, weight: 2, threshold: 5 }
      - { type: skills_without_compact, weight: 1, threshold: 3 }

# ─── Discovery rules ──────────────────────────────────────────────────
# How to match files to templates during auto-discovery.
# Evaluated in order; {module} is resolved from plugin.json or dirname.

discovery_rules:
  - pattern: "AGENTS.md"
    template: agents-md
    name_format: "agents-md"
  - pattern: "docs/{module}-roadmap.md"
    template: roadmap
    name_format: "{module}-roadmap"
  - pattern: "docs/roadmap.md"
    template: roadmap
    name_format: "roadmap"
    skip_if_exists: "docs/{module}-roadmap.md"
  - pattern: "docs/PRD.md"
    template: prd
    name_format: "prd"
  - pattern: "docs/{module}-vision.md"
    template: vision
    name_format: "{module}-vision"
  - pattern: "docs/vision.md"
    template: vision
    name_format: "vision"
    skip_if_exists: "docs/{module}-vision.md"
  - pattern: "docs/solutions/"
    template: distillation-candidates
    name_format: "distillation-candidates"
